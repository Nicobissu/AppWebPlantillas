<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B4332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40916C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74C69D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40916C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D4A017;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F0C040;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Logo mark background circle -->
  <circle cx="55" cy="55" r="48" fill="url(#bgGrad)" />
  <circle cx="55" cy="55" r="44" fill="none" stroke="#74C69D" stroke-width="1.2" opacity="0.5"/>

  <!-- Stylized A - building/mountain shape -->
  <!-- Main A triangle (building silhouette) -->
  <polygon points="55,15 82,75 28,75" fill="none" stroke="#FFFFFF" stroke-width="2.8" stroke-linejoin="round"/>
  <!-- A crossbar -->
  <line x1="37" y1="57" x2="73" y2="57" stroke="#D4A017" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tree/nature element: small triangle on top of A peak -->
  <polygon points="55,10 63,26 47,26" fill="#74C69D" opacity="0.85"/>
  <!-- Tree trunk -->
  <rect x="53" y="25" width="4" height="5" fill="#74C69D" opacity="0.7" rx="1"/>

  <!-- Construction grid lines inside the A (subtle) -->
  <line x1="46" y1="65" x2="46" y2="75" stroke="#74C69D" stroke-width="1" opacity="0.5"/>
  <line x1="55" y1="65" x2="55" y2="75" stroke="#74C69D" stroke-width="1" opacity="0.5"/>
  <line x1="64" y1="65" x2="64" y2="75" stroke="#74C69D" stroke-width="1" opacity="0.5"/>

  <!-- Small windows in the A building -->
  <rect x="50" y="62" width="5" height="5" fill="#D4A017" opacity="0.8" rx="0.5"/>
  <rect x="59" y="62" width="5" height="5" fill="#D4A017" opacity="0.8" rx="0.5"/>

  <!-- Gold accent line at bottom of circle -->
  <path d="M 20 82 Q 55 88 90 82" stroke="url(#goldGrad)" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Company Name: AMAZONIA -->
  <text x="113" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" letter-spacing="4" fill="#1B4332">AMAZONIA</text>

  <!-- Divider line -->
  <line x1="113" y1="52" x2="308" y2="52" stroke="url(#goldGrad)" stroke-width="1.5"/>

  <!-- Subtitle: CONSTRUCCIÓN -->
  <text x="113" y="68" font-family="Arial, Helvetica, sans-serif" font-size="12.5" font-weight="400" letter-spacing="5.5" fill="#40916C">CONSTRUCCIÓN</text>

  <!-- Tagline -->
  <text x="113" y="86" font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="300" letter-spacing="1.5" fill="#6B7280" font-style="italic">Construyendo el futuro con naturaleza</text>
</svg>
